<div class="row-section d-flex justify-content-between align-items-center mt-2">
    <div class="page-header">Leads Reports <span *ngIf="tableData && tableData.length > 0" class="count">{{paging.total}}</span></div>
</div>


<div class="row-section mt-4">
    <app-dynamic-table
        [columns]="tableColumns"
        [showCheckbox]="true"
        [showExport]="true"
        [data]="tableData"
        [paging]="paging"
        [filters]="tableFilters"
        [loading]="isLoading"
        [emptyDataMessage]="'No leads exist currently.'"
        [emptyDataImage]="'assets/img/project/illustrations/user.webp'"
        (rowClick)="viewRow($event)"
        (actionClick)="onTableAction($event)"
        (pagingChange)="onPagingChange($event)"
        (searchChange)="onSearchChange($event)"
        (filterChange)="onFilterChange($event)"
        (selectionChange)="onSelectionChange($event)"
    ></app-dynamic-table>
</div>
